spring.application.name=workflow-engine
spring.config.import=optional:consul:
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.config.enabled=true
spring.cloud.consul.config.prefixes[0]=config
spring.cloud.consul.config.default-context=application
spring.cloud.consul.config.profile-separator=,
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:workflow_engine}
spring.datasource.username=${POSTGRES_USER:workflow}
spring.datasource.password=${POSTGRES_PASSWORD:workflow}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html